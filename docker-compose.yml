services:

  mysql:

    image: mysql:8.0

    container_name: hive-mysql

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: metastore


    ports:

      - "3306:3306"


    volumes:

      - mysql-data:/var/lib/mysql

    healthcheck:

      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]

      interval: 10s

      timeout: 10s

      retries: 10
      start_period: 60s



  metastore:

    image: apache/hive:3.1.3

    container_name: hive-metastore


    depends_on:

      mysql:
        condition: service_healthy


    environment:

      SERVICE_NAME: metastore
      SKIP_SCHEMA_INIT: "true"


    ports:

      - "9083:9083"


    volumes:

      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml

      - ./hive/lib/mysql-connector-j.jar:/opt/hive/lib/mysql-connector-j.jar

      - warehouse-data:/opt/hive/warehouse


    entrypoint: /bin/sh -c "mkdir -p /tmp/hive && chmod 1777 /tmp/hive; export HIVE_CONF_DIR=/opt/hive/conf HADOOP_CLIENT_OPTS=' -Xmx1G '; if /opt/hive/bin/schematool -dbType mysql -info >/dev/null 2>&1; then echo 'Schema already initialized, skipping init'; else echo 'Initializing schema...'; /opt/hive/bin/schematool -dbType mysql -initSchema || exit 1; fi; exec /opt/hive/bin/hive --service metastore"

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9083' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s



  hiveserver2:

    image: apache/hive:3.1.3

    container_name: hive-server2


    depends_on:

      metastore:
        condition: service_healthy


    environment:

      SERVICE_NAME: hiveserver2
      SKIP_SCHEMA_INIT: "true"


    ports:

      - "10000:10000"


    volumes:

      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml

      - ./hive/lib/mysql-connector-j.jar:/opt/hive/lib/mysql-connector-j.jar

      - warehouse-data:/opt/hive/warehouse


    entrypoint: /bin/sh -c "mkdir -p /tmp/hive && chmod 1777 /tmp/hive; export HIVE_CONF_DIR=/opt/hive/conf HADOOP_CLIENT_OPTS=' -Xmx1G '; exec /opt/hive/bin/hive --service hiveserver2"

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/10000' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s



volumes:

  mysql-data:
  warehouse-data:


networks:
  default:
    name: hive-net
